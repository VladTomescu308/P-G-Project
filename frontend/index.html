<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&G Manufacturing Dashboard</title>
    <link rel="stylesheet" href="/frontend/style.css">
    <script src="/frontend/script.js" defer></script>
</head>
<body>

    <div class="container">
        <h1>Dashboard Produse 🏭</h1>
        
        <div class="form-section">
            <h2>Adauga Produs Nou ➕</h2>
            <form id="formAdaugare">
                <div class="form-group">
                    <label for="numeProdus">Nume Produs (ID Unic): *</label>
                    <input type="text" id="numeProdus" required placeholder="ex: SAMPON-001">
                </div>
                <div class="form-group">
                    <label for="descriereProdus">Descriere:</label>
                    <input type="text" id="descriereProdus" placeholder="ex: Sampon Anti-Matreata 500ml">
                </div>
                <div class="form-group">
                    <label for="tipProdus">Tip Produs:</label>
                    <input type="text" id="tipProdus" placeholder="ex: Lichid">
                </div>
                <button type="submit" class="btn-success">Salveaza Produsul in DB</button>
            </form>
            <div id="mesajFormular"></div> 
        </div>

        <hr>

        <h2>Statistici Consumatori 📊</h2>
        <div class="chart-container" style="text-align: center;">
            <img src="/stats/consumers-chart" alt="Grafic Consumatori" style="max-width: 100%; border: 1px solid #ccc; border-radius: 8px;">
        </div>

        <hr>

        <hr>
        
        <h2>Tabel Proprietate (Ownership) 👥</h2>
        <table class="tabel-date">
            <thead>
                <tr>
                    <th>ID Produs</th>
                    <th>Prenume Originator</th>
                    <th>Nume Originator</th>
                    <th>Email</th>
                    <th>Nume Proprietar</th>
                </tr>
            </thead>
            <tbody id="corpTabelOwnership">
                </tbody>
        </table>

        <h2>Inventar Curent</h2>
        <button id="btnIncarca">Reincarca Lista</button>
        <ul id="listaProduse">
            </ul>
    </div>

</body>
</html>
